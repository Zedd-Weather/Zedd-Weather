# =============================================================================
# InfluxDB 2.7 – PersistentVolumeClaim, Deployment, and Service
# Namespace: zedd-weather
# Scheduled on nodes with label: storage=nvme
# =============================================================================

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: influxdb-pvc
  namespace: zedd-weather
  labels:
    app.kubernetes.io/name: influxdb
    app.kubernetes.io/part-of: zedd-weather
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: zedd-weather
  labels:
    app.kubernetes.io/name: influxdb
    app.kubernetes.io/part-of: zedd-weather
    app.kubernetes.io/component: database
spec:
  replicas: 1
  # InfluxDB OSS does not support more than one replica against the same PVC
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
        app.kubernetes.io/part-of: zedd-weather
    spec:
      # Run on NVMe-backed storage nodes (e.g. pinet-alpha)
      nodeSelector:
        storage: nvme

      securityContext:
        fsGroup: 1000

      containers:
        - name: influxdb
          image: influxdb:2.7-alpine
          ports:
            - name: http
              containerPort: 8086
              protocol: TCP

          # Non-secret init settings
          envFrom:
            - configMapRef:
                name: influxdb-config

          # Secret credentials injected individually
          env:
            - name: DOCKER_INFLUXDB_INIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: influxdb-credentials
                  key: DOCKER_INFLUXDB_INIT_USERNAME
            - name: DOCKER_INFLUXDB_INIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: influxdb-credentials
                  key: DOCKER_INFLUXDB_INIT_PASSWORD
            - name: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-credentials
                  key: INFLUXDB_TOKEN

          volumeMounts:
            - name: data
              mountPath: /var/lib/influxdb2

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: influxdb-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: zedd-weather
  labels:
    app.kubernetes.io/name: influxdb
    app.kubernetes.io/part-of: zedd-weather
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app: influxdb
  ports:
    - name: http
      port: 8086
      targetPort: 8086
      protocol: TCP
