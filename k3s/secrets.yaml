# =============================================================================
# Zedd-Weather Secrets – TEMPLATE FILE
#
# !! IMPORTANT !!
# All values below are BASE64-ENCODED PLACEHOLDERS.
# You MUST replace every <base64-encoded-placeholder> with the real base64
# value before deploying to any environment.
#
# To encode a value:
#   echo -n 'my-secret-value' | base64
#
# To apply:
#   kubectl apply -f k3s/secrets.yaml -n zedd-weather
#
# Never commit real secrets to version control.
# Use a secrets manager (e.g. Vault, Sealed Secrets, SOPS) in production.
# =============================================================================

---
# InfluxDB admin credentials and API token
apiVersion: v1
kind: Secret
metadata:
  name: influxdb-credentials
  namespace: zedd-weather
  labels:
    app.kubernetes.io/part-of: zedd-weather
    app.kubernetes.io/component: database
type: Opaque
data:
  # echo -n 'admin' | base64
  DOCKER_INFLUXDB_INIT_USERNAME: <base64-encoded-placeholder>
  # echo -n 'your-strong-password' | base64
  DOCKER_INFLUXDB_INIT_PASSWORD: <base64-encoded-placeholder>
  # echo -n 'your-influxdb-api-token' | base64
  INFLUXDB_TOKEN: <base64-encoded-placeholder>

---
# Grafana admin password
apiVersion: v1
kind: Secret
metadata:
  name: grafana-credentials
  namespace: zedd-weather
  labels:
    app.kubernetes.io/part-of: zedd-weather
    app.kubernetes.io/component: grafana
type: Opaque
data:
  # echo -n 'your-grafana-admin-password' | base64
  GF_SECURITY_ADMIN_PASSWORD: <base64-encoded-placeholder>

---
# External API credentials
apiVersion: v1
kind: Secret
metadata:
  name: api-credentials
  namespace: zedd-weather
  labels:
    app.kubernetes.io/part-of: zedd-weather
    app.kubernetes.io/component: ai-orchestration
type: Opaque
data:
  # echo -n 'your-gemini-api-key' | base64
  GEMINI_API_KEY: <base64-encoded-placeholder>
