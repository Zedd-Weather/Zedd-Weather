# =============================================================================
# Construction Intelligence Engine – Deployment
# Runs on pinet-alpha (node with label storage=nvme).
# Consumes sensor data from InfluxDB and produces construction site insights.
# =============================================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: construction-engine
  namespace: zedd-weather
  labels:
    app.kubernetes.io/name: construction-engine
    app.kubernetes.io/part-of: zedd-weather
    app.kubernetes.io/component: construction-engine
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: construction-engine
  template:
    metadata:
      labels:
        app: construction-engine
        app.kubernetes.io/part-of: zedd-weather
    spec:
      nodeSelector:
        storage: nvme

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001

      containers:
        - name: construction-engine
          # Uses the shared zedd-weather-edge image (which bundles the full
          # Zweather package) with an explicit command override to run the
          # construction analysis entry-point instead of the default edge
          # collector.  Replace with a dedicated
          # ghcr.io/williammajanja/zedd-weather-construction:latest image once
          # the construction service grows to require different system deps.
          image: ghcr.io/williammajanja/zedd-weather-edge:latest
          imagePullPolicy: Always

          # Entry-point that runs construction site analysis and safety scheduling.
          command: ["python", "-m", "Zweather.construction.engine"]

          # Construction thresholds from ConfigMap
          envFrom:
            - configMapRef:
                name: construction-config
            - configMapRef:
                name: zedd-weather-config

          env:
            - name: INFLUXDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-credentials
                  key: INFLUXDB_TOKEN
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-credentials
                  key: GEMINI_API_KEY

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
