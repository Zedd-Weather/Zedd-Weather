services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: zedd-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt-data:/mosquitto/data

  sensory-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zedd-sensory-worker
    restart: unless-stopped
    privileged: true
    environment:
      MQTT_BROKER_HOST: ${MQTT_BROKER_HOST:-mqtt-broker}
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT:-1883}
      MQTT_TOPIC: ${MQTT_TOPIC:-weather_station/telemetry}
      SENSE_HAT_ENABLED: "${SENSE_HAT_ENABLED:-true}"
      AI_HAT_ENABLED: "${AI_HAT_ENABLED:-true}"
      AI_HAT_MODEL_PATH: "${AI_HAT_MODEL_PATH:-/opt/zedd/models/weather_classify.hef}"
      M2_NVME_ENABLED: "${M2_NVME_ENABLED:-false}"
      M2_NVME_PATH: "${M2_NVME_PATH:-/mnt/nvme}"
      RAIN_GAUGE_ENABLED: "${RAIN_GAUGE_ENABLED:-false}"
      UV_SENSOR_ENABLED: "${UV_SENSOR_ENABLED:-false}"
      ENVIRO_PLUS_ENABLED: "${ENVIRO_PLUS_ENABLED:-false}"
      MODBUS_ENABLED: "${MODBUS_ENABLED:-false}"
      PUBLISH_INTERVAL: ${PUBLISH_INTERVAL:-10.0}
    devices:
      - /dev/i2c-1:/dev/i2c-1
      - /dev/hailo0:/dev/hailo0
    volumes:
      - /opt/zedd/models:/opt/zedd/models:ro
    command: ["python", "-m", "Zweather.node1_telemetry.mqtt_publisher"]
    depends_on:
      - mqtt-broker

  ai-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zedd-ai-worker
    restart: unless-stopped
    privileged: true
    environment:
      MQTT_BROKER_HOST: ${MQTT_BROKER_HOST:-mqtt-broker}
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT:-1883}
      AI_HAT_ENABLED: "${AI_HAT_ENABLED:-true}"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://10.0.0.20:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:2b}
    devices:
      - /dev/hailo0:/dev/hailo0
    volumes:
      - /opt/zedd/models:/opt/zedd/models:ro
    command: ["python", "-m", "Zweather.node2_orchestration.zedd_orchestrator"]
    depends_on:
      - mqtt-broker

volumes:
  mqtt-data:
