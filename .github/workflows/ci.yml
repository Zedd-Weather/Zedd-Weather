name: "CI – Lint, Test & Build"

on:
  push:
    paths:
      - "Zweather/**"
      - "Dockerfile"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main

# Restrict default token permissions; each job opts in to what it needs.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Python linting
  # ---------------------------------------------------------------------------
  lint-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Zweather/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install paho-mqtt influxdb-client python-dotenv google-genai aiohttp \
            pymodbus pyserial smbus2 requests fastapi uvicorn httpx \
            flake8 mypy pytest pytest-mock

      - name: Flake8
        run: |
          flake8 Zweather/ --select=E9,F63,F7,F82 --show-source --statistics

      - name: Mypy
        run: |
          mypy Zweather/app.py Zweather/agricultural/engine.py Zweather/construction/engine.py Zweather/alerting/rules.py \
            --ignore-missing-imports

  # ---------------------------------------------------------------------------
  # Python tests
  # ---------------------------------------------------------------------------
  test-python:
    runs-on: ubuntu-latest
    needs: lint-python
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install paho-mqtt influxdb-client python-dotenv google-genai aiohttp \
            pymodbus pyserial smbus2 requests fastapi uvicorn httpx \
            flake8 mypy pytest pytest-mock

      - name: Run tests
        run: pytest Zweather/tests/ -v --tb=short

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Docker build
  # ---------------------------------------------------------------------------
  build-docker:
    runs-on: ubuntu-latest
    needs: [lint-python]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/zedd-weather-edge

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64,linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
